<!DOCTYPE html>
<html>

<head>

<title>Select Seat</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="css/seat-selection.css">


</head>


<body class="bg-light">



<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h3>
Select Coach & Seat
</h3>

</div>



<div class="card-body">



<h4 id="trainName"></h4>

<p id="route"></p>




<label class="fw-bold">

Choose Coach

</label>



<select id="coach"
class="form-select mb-4">


<option value="A1">
A1 Coach
</option>


<option value="A2">
A2 Coach
</option>


<option value="B1">
B1 Coach
</option>


<option value="S1">
S1 Coach
</option>


</select>





<h5>

Available Seats

</h5>



<div id="seatContainer"
class="seat-container">


</div>




<h5 
id="selectedSeat"
class="text-primary mt-3">

No Seat Selected

</h5>




<button
onclick="continueBooking()"
class="btn btn-success w-100 mt-3">


Continue


</button>




</div>

</div>

</div>





<script src="js/seat-selection.js"></script>


</body>

</html>

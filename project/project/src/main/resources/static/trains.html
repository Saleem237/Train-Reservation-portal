<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrainEase | Search Trains</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/trains.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="dashboard.html">

                <i class="bi bi-train-front-fill"></i>

                TrainEase

            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link" href="dashboard.html">

                            <i class="bi bi-grid-fill"></i>

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active" href="trains.html">

                            <i class="bi bi-search"></i>

                            Search Trains

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="my-bookings.html">

                            <i class="bi bi-ticket-perforated-fill"></i>

                            My Bookings

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="profile.html">

                            <i class="bi bi-person-fill"></i>

                            Profile

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= PAGE HEADER ================= -->

    <section class="bg-light py-5">

        <div class="container text-center">

            <h1 class="fw-bold">

                <i class="bi bi-search"></i>

                Search Available Trains

            </h1>

            <p class="text-muted">

                Search trains by source, destination and travel date.

            </p>

        </div>

    </section>

    <!-- ================= SEARCH FORM ================= -->

    <section class="container my-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4">

                <div class="row g-3">

                    <div class="col-lg-3 col-md-6">

                        <label class="form-label fw-semibold">

                            From

                        </label>

                        <input
                            type="text"
                            id="from"
                            class="form-control"
                            placeholder="Enter Source Station">

                    </div>

                    <div class="col-lg-3 col-md-6">

                        <label class="form-label fw-semibold">

                            To

                        </label>

                        <input
                            type="text"
                            id="to"
                            class="form-control"
                            placeholder="Enter Destination">

                    </div>

                    <div class="col-lg-3 col-md-6">

                        <label class="form-label fw-semibold">

                            Journey Date

                        </label>

                        <input
                            type="date"
                            id="date"
                            class="form-control">

                    </div>

                    <div class="col-lg-3 col-md-6 d-grid">

                        <label class="form-label">&nbsp;</label>

                        <button class="btn btn-primary search-btn">

                            <i class="bi bi-search"></i>

                            Search Trains

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- ================= SEARCH STATUS ================= -->

    <section class="container">

        <div id="loadingSpinner"
            class="text-center my-5"
            style="display:none;">

            <div class="spinner-border text-primary"></div>

            <p class="mt-3">

                Searching trains...

            </p>

        </div>

        <div id="noData"
            class="alert alert-warning text-center"
            style="display:none;">

            <i class="bi bi-exclamation-circle-fill"></i>

            No trains found for the selected route.

        </div>

    </section>

    <!-- ================= TRAIN RESULTS ================= -->

    <section class="container mb-5">

        <div id="trainContainer">

            <!--
                JavaScript will dynamically create
                train cards here using the data returned
                from Spring Boot.
            -->

        </div>

    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Trains JS -->
    <script src="js/trains.js"></script>

</body>
</html>

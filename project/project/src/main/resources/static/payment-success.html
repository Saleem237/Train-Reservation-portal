<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <h1 class="text-success">
                ✅ Payment Successful
            </h1>

            <hr>

            <h4>
                Booking ID :
                <span id="bookingId"></span>
            </h4>

            <h4>
                Transaction ID :
                <span id="transactionId"></span>
            </h4>

            <h4>
                Payment Method :
                <span id="paymentMethod"></span>
            </h4>

            <h4>
                Payment Status :
                <span id="paymentStatus"></span>
            </h4>

            <h4>
                Amount Paid :
                ₹<span id="amount"></span>
            </h4>

            <br>

            <a href="trains.html" class="btn btn-primary">
                Book Another Ticket
            </a>

            <a href="my-bookings.html" class="btn btn-success">
                My Bookings
            </a>

        </div>

    </div>

</div>

<script>

document.getElementById("bookingId").innerText =
localStorage.getItem("bookingId");

document.getElementById("transactionId").innerText =
localStorage.getItem("transactionId");

document.getElementById("paymentMethod").innerText =
localStorage.getItem("paymentMethod");

document.getElementById("paymentStatus").innerText =
localStorage.getItem("paymentStatus");

document.getElementById("amount").innerText =
localStorage.getItem("bookingFare");

</script>

</body>

</html>

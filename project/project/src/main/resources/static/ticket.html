<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/ticket.css" />
</head>
<body>
    <div class="container py-5">
        <div class="ticket">
            <div class="ticket-header">
                <div>
                    <h2><i class="bi bi-train-front-fill"></i> Train Reservation</h2>
                    <p>E-Ticket</p>
                </div>
                <div class="pnr-box">
                    <span>PNR</span><br />
                    <strong id="pnr">--</strong>
                </div>
            </div>

            <div class="route-section">
                <div>
                    <h3 id="source">--</h3>
                    <span>Departure</span>
                </div>
                <i class="bi bi-arrow-right"></i>
                <div>
                    <h3 id="destination">--</h3>
                    <span>Arrival</span>
                </div>
            </div>

            <div class="details">
                <div class="detail-box"><label>Train Number</label><h5 id="trainNumber"></h5></div>
                <div class="detail-box"><label>Train Name</label><h5 id="trainName"></h5></div>
                <div class="detail-box"><label>Passenger</label><h5 id="passenger"></h5></div>
                <div class="detail-box"><label>Journey Date</label><h5 id="date"></h5></div>
                <div class="detail-box highlight"><label>Coach</label><h5 id="coach"></h5></div>
                <div class="detail-box highlight"><label>Seat Number</label><h5 id="seat"></h5></div>
                <div class="detail-box"><label>Class</label><h5 id="class"></h5></div>
                <div class="detail-box"><label>Total Fare</label><h5 id="fare"></h5></div>
            </div>

            <div id="status" class="status">CONFIRMED</div>

            <div class="qr-section">
                <h5>Scan Ticket</h5>
                <div id="qrCode"></div>
                <p>Show this QR code during verification</p>
            </div>

            <div class="ticket-actions text-center pb-4">
                <button class="btn btn-primary me-2" onclick="printTicket()">Download PDF</button>
                <button class="btn btn-outline-primary" onclick="goHome()">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/ticket.js"></script>
</body>
</html>

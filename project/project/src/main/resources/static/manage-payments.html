<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manage Payments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="d-flex">

<div class="sidebar">

<h3>🚆 Railway Admin</h3>

<a href="admin-dashboard.html">Dashboard</a>
<a href="manage-users.html">Users</a>
<a href="manage-trains.html">Trains</a>
<a href="manage-bookings.html">Bookings</a>
<a href="manage-payments.html">Payments</a>

<button class="btn btn-danger mt-4 w-100" onclick="logout()">
Logout
</button>

</div>

<div class="content">

<h2 class="mb-4">Manage Payments</h2>

<div class="row mb-4">

<div class="col-md-4">

<div class="card bg-success text-white">

<div class="card-body text-center">

<h5>Total Revenue</h5>

<h2 id="totalRevenue">₹0</h2>

</div>

</div>

</div>

</div>

<input
class="form-control mb-3"
id="searchPayment"
placeholder="Search Transaction ID..."
onkeyup="searchPayment()">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Booking ID</th>
<th>Transaction ID</th>
<th>Amount</th>
<th>Method</th>
<th>Status</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/manage-payments.js"></script>

</body>

</html>

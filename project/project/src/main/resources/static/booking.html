<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Booking Details</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="css/booking.css">


</head>



<body class="bg-light">


<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h3>

Booking Details

</h3>

</div>



<div class="card-body">



<div class="alert alert-info">


<h5 id="trainInfo"></h5>


<p id="route"></p>


<p>

Coach :

<b id="coach"></b>

</p>


<p>

Seat Number :

<b id="seat"></b>

</p>



<p>

Fare :

₹ <b id="fare"></b>

</p>



</div>





<form id="bookingForm">



<div class="row">


<div class="col-md-6 mb-3">


<label>

Passenger Name

</label>


<input

type="text"

id="passengerName"

class="form-control"

required>


</div>





<div class="col-md-6 mb-3">


<label>

Age

</label>


<input

type="number"

id="age"

class="form-control"

required>


</div>


</div>







<div class="row">


<div class="col-md-6 mb-3">


<label>

Gender

</label>


<select id="gender"
class="form-select">


<option>Male</option>

<option>Female</option>

<option>Other</option>


</select>


</div>




<div class="col-md-6 mb-3">


<label>

Journey Date

</label>


<input

type="date"

id="journeyDate"

class="form-control"

required>


</div>



</div>







<button

class="btn btn-success w-100">


Proceed Payment


</button>



</form>




</div>


</div>


</div>



<script src="js/booking.js"></script>


</body>

</html>

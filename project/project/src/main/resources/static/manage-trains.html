<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Manage Trains

</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="css/manage-trains.css">

</head>

<body>

<div class="wrapper">

<!-- Sidebar -->

<div class="sidebar">

<h2>

<i class="fa-solid fa-train"></i>

Rail Admin

</h2>

<ul>

<li>

<a href="admin-dashboard.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

</li>

<li class="active">

<a href="manage-trains.html">

<i class="fa-solid fa-train"></i>

Manage Trains

</a>

</li>

<li>

<a href="manage-users.html">

<i class="fa-solid fa-users"></i>

Manage Users

</a>

</li>

<li>

<a href="manage-bookings.html">

<i class="fa-solid fa-ticket"></i>

Manage Bookings

</a>

</li>

<li>

<a href="index.html">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h2>

Train Management

</h2>

<button
class="btn btn-success"
data-bs-toggle="modal"
data-bs-target="#trainModal">

<i class="fa-solid fa-plus"></i>

Add Train

</button>

</div>

<div class="card shadow mt-4">

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
id="searchTrain"
class="form-control"
placeholder="Search Train Number or Name">

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-primary">

<tr>

<th>ID</th>

<th>Train No</th>

<th>Name</th>

<th>Source</th>

<th>Destination</th>

<th>Departure</th>

<th>Arrival</th>

<th>Fare</th>

<th>Seats</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="trainTable">

<!-- JS -->
</tbody>

</table>

</div>

</div>

</div>

</div>

<!-- Add / Edit Train Modal -->

<div class="modal fade"
id="trainModal"
tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header bg-primary text-white">

<h5 class="modal-title">

Train Details

</h5>

<button
type="button"
class="btn-close btn-close-white"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<form id="trainForm">

<input
type="hidden"
id="trainId">

<div class="row">

<div class="col-md-6 mb-3">

<label>

Train Number

</label>

<input
type="text"
id="trainNumber"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Train Name

</label>

<input
type="text"
id="trainName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Source

</label>

<input
type="text"
id="source"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Destination

</label>

<input
type="text"
id="destination"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Departure Time

</label>

<input
type="time"
id="departureTime"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Arrival Time

</label>

<input
type="time"
id="arrivalTime"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Fare (₹)

</label>

<input
type="number"
id="fare"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Total Seats

</label>

<input
type="number"
id="totalSeats"
class="form-control"
required>

</div>

</div>

</form>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Close

</button>

<button
id="saveBtn"
class="btn btn-success">

Save Train

</button>

<button
id="updateBtn"
class="btn btn-warning"
style="display:none;">

Update Train

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/manage-trains.js"></script>

</body>

</html>
